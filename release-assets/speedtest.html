<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest - Network Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!--
    CONFIGURATION:
    Set the default server by changing the data-default-server attribute below.
    Options: "us" (United States), "hk" (Hong Kong), "jp" (Japan)
    -->
    <meta name="default-server" data-default-server="jp01">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141a;
            --bg-tertiary: #1c1c24;
            --bg-card: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent-primary: #00d4ff;
            --accent-secondary: #0099cc;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --success-color: #00ff88;
            --warning-color: #ffaa00;
            --download-color: #00d4ff;
            --upload-color: #00ff88;
            --ping-color: #ff6b9d;
        }

        [data-theme="light"] {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e9ecef;
            --bg-card: rgba(0, 0, 0, 0.03);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a5a;
            --text-muted: #8a8a9a;
            --accent-primary: #0066cc;
            --accent-secondary: #0052a3;
            --accent-glow: rgba(0, 102, 204, 0.2);
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --download-color: #0066cc;
            --upload-color: #00aa66;
            --ping-color: #cc0066;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0, 255, 136, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        [data-theme="light"] body::before {
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0, 102, 204, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0, 170, 102, 0.03) 0%, transparent 40%);
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        /* Theme Toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            border-color: var(--accent-primary);
            background: var(--bg-secondary);
        }

        .theme-icon {
            width: 18px;
            height: 18px;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1.5rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            gap: 1.5rem;
        }

        /* Server Selector */
        .server-selector {
            width: 100%;
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        .server-option {
            flex: 1;
            max-width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.875rem 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .server-option:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow-color);
        }

        .server-option.active {
            border-color: var(--accent-primary);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 212, 255, 0.05));
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        }

        [data-theme="light"] .server-option.active {
            background: linear-gradient(135deg, rgba(0, 102, 204, 0.08), rgba(0, 102, 204, 0.03));
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.1);
        }

        .server-flag {
            font-size: 1.5rem;
            line-height: 1;
        }

        .server-name {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
        }

        .server-location {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Speed Display Card */
        .speed-display-card {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 1.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .speed-display-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            opacity: 0.5;
        }

        .current-phase {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .speed-main-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .speed-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .speed-unit {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .speed-bar-container {
            width: 100%;
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .speed-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 4px;
            transition: width 0.1s ease-out;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 100%;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.25rem 1rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-color);
        }

        .stat-card.active {
            border-color: var(--accent-primary);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), transparent);
        }

        [data-theme="light"] .stat-card.active {
            background: linear-gradient(135deg, rgba(0, 102, 204, 0.06), transparent);
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: var(--bg-tertiary);
            transition: all 0.3s ease;
        }

        .stat-card[data-type="ping"] .stat-icon {
            background: rgba(255, 107, 157, 0.1);
        }

        .stat-card[data-type="ping"] .stat-icon svg {
            fill: var(--ping-color);
        }

        .stat-card[data-type="download"] .stat-icon {
            background: rgba(0, 212, 255, 0.1);
        }

        .stat-card[data-type="download"] .stat-icon svg {
            fill: var(--download-color);
        }

        .stat-card[data-type="upload"] .stat-icon {
            background: rgba(0, 255, 136, 0.1);
        }

        .stat-card[data-type="upload"] .stat-icon svg {
            fill: var(--upload-color);
        }

        .stat-icon svg {
            width: 22px;
            height: 22px;
            fill: var(--text-secondary);
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            transition: color 0.3s ease;
        }

        .stat-card[data-type="ping"].active .stat-value {
            color: var(--ping-color);
        }

        .stat-card[data-type="download"].active .stat-value {
            color: var(--download-color);
        }

        .stat-card[data-type="upload"].active .stat-value {
            color: var(--upload-color);
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-unit {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Start Button */
        .start-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .start-button {
            width: 100%;
            max-width: 280px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .start-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .start-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .start-button:disabled {
            background: linear-gradient(135deg, var(--warning-color), #cc8800);
            cursor: not-allowed;
            opacity: 0.8;
        }

        .start-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .start-button:hover::before {
            left: 100%;
        }

        .status-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* Footer */
        footer {
            padding: 0.75rem;
            text-align: center;
            flex-shrink: 0;
        }

        footer p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Responsive - Mobile Portrait */
        @media (max-width: 480px) {
            header {
                padding: 0.75rem 1rem;
            }

            .logo {
                font-size: 1.25rem;
            }

            .logo-icon {
                width: 36px;
                height: 36px;
            }

            main {
                padding: 0.5rem 1rem;
                gap: 1rem;
            }

            .server-option {
                padding: 0.625rem 0.375rem;
                border-radius: 12px;
            }

            .server-flag {
                font-size: 1.25rem;
            }

            .server-name {
                font-size: 0.75rem;
            }

            .server-location {
                font-size: 0.65rem;
            }

            .speed-display-card {
                padding: 1.25rem 1.5rem;
                border-radius: 20px;
            }

            .speed-value {
                font-size: 4rem;
            }

            .speed-unit {
                font-size: 1rem;
            }

            .stats-grid {
                gap: 0.75rem;
            }

            .stat-card {
                padding: 1rem 0.5rem;
                border-radius: 16px;
            }

            .stat-icon {
                width: 40px;
                height: 40px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .start-button {
                height: 52px;
                font-size: 1rem;
            }
        }

        /* Animation for testing */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .testing {
            animation: pulse 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">&#9889;</div>
            <span>SpeedTest</span>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span>Theme</span>
            <svg class="theme-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
        </button>
    </header>

    <main>
        <!-- Server Selector -->
        <div class="server-selector">
            <div class="server-option" data-server="us" data-url="https://us-speedtest-nk1.483300.xyz/">
                <div class="server-flag">&#127482;&#127480;</div>
                <div class="server-name">United States</div>
                <div class="server-location">San Francisco</div>
            </div>
            <div class="server-option active" data-server="hk" data-url="https://hk-speedtest-nk2.483300.xyz/">
                <div class="server-flag">&#127469;&#127472;</div>
                <div class="server-name">Hong Kong</div>
                <div class="server-location">Asia Pacific</div>
            </div>
            <div class="server-option" data-server="jp01" data-url="https://jp-speedtest-nk1.483300.xyz/">
                <div class="server-flag">&#127471;&#127477;</div>
                <div class="server-name">Japan01</div>
                <div class="server-location">Tokyo01</div>
            </div>
            <div class="server-option" data-server="jp02" data-url="https://jp-speedtest-nk4.483300.xyz/">
                <div class="server-flag">&#127471;&#127477;</div>
                <div class="server-name">Japan02</div>
                <div class="server-location">Tokyo02</div>
            </div>
        </div>

        <!-- Main Speed Display -->
        <div class="speed-display-card">
            <div class="current-phase" id="currentPhase">Ready to Test</div>
            <div class="speed-main-display">
                <div class="speed-value" id="speedValue">0.0</div>
                <div class="speed-unit">Mbps</div>
            </div>
            <div class="speed-bar-container">
                <div class="speed-bar" id="speedBar" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card" id="pingCard" data-type="ping">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>
                <div class="stat-value" id="pingValue">--</div>
                <div class="stat-label">Ping</div>
                <div class="stat-unit">ms</div>
            </div>
            <div class="stat-card" id="downloadCard" data-type="download">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                </div>
                <div class="stat-value" id="downloadValue">--</div>
                <div class="stat-label">Download</div>
                <div class="stat-unit">Mbps</div>
            </div>
            <div class="stat-card" id="uploadCard" data-type="upload">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                </div>
                <div class="stat-value" id="uploadValue">--</div>
                <div class="stat-label">Upload</div>
                <div class="stat-unit">Mbps</div>
            </div>
        </div>

        <!-- Start Button -->
        <div class="start-section">
            <button class="start-button" id="startButton">
                <span id="buttonText">Start Test</span>
            </button>
            <div class="status-text" id="statusText">Click to begin network performance test</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 SpeedTest &bull; Simulated frontend testing &bull; No actual data transfer</p>
    </footer>

    <script>
        // Theme Management
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('svg');
        let themeMode = 'auto'; // auto, light, dark

        const sunIcon = '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 9c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000 1.41.996.996 0 001.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06z"/>';
        const moonIcon = '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>';
        const autoIcon = '<path d="M12 16c-2.209 0-4-1.791-4-4s1.791-4 4-4 4 1.791 4 4-1.791 4-4 4zm0 6c-3.313 0-6-2.687-6-6s2.687-6 6-6 6 2.687 6 6-2.687 6-6 6zm0-14c-1.105 0-2-.895-2-2s.895-2 2-2 2 .895 2 2-.895 2-2 2z"/>';

        function updateTheme() {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (themeMode === 'auto') {
                if (prefersDark) {
                    document.body.removeAttribute('data-theme');
                } else {
                    document.body.setAttribute('data-theme', 'light');
                }
                themeToggle.querySelector('span').textContent = 'Auto';
                themeIcon.innerHTML = autoIcon;
            } else if (themeMode === 'dark') {
                document.body.removeAttribute('data-theme');
                themeToggle.querySelector('span').textContent = 'Dark';
                themeIcon.innerHTML = moonIcon;
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeToggle.querySelector('span').textContent = 'Light';
                themeIcon.innerHTML = sunIcon;
            }
        }

        themeToggle.addEventListener('click', () => {
            if (themeMode === 'auto') {
                themeMode = 'light';
            } else if (themeMode === 'light') {
                themeMode = 'dark';
            } else {
                themeMode = 'auto';
            }
            updateTheme();
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (themeMode === 'auto') updateTheme();
        });

        updateTheme();

        // Server Selection
        const serverOptions = document.querySelectorAll('.server-option');
        const defaultServerMeta = document.querySelector('meta[name="default-server"]');
        const defaultServer = defaultServerMeta ? defaultServerMeta.dataset.defaultServer : 'hk';
        let currentServer = defaultServer;

        // Initialize server selection UI
        serverOptions.forEach(option => {
            option.classList.remove('active');
            if (option.dataset.server === defaultServer) {
                option.classList.add('active');
            }
        });

        serverOptions.forEach(option => {
            option.addEventListener('click', () => {
                const targetUrl = option.dataset.url;
                const targetServer = option.dataset.server;

                if (targetServer !== currentServer) {
                    window.location.href = targetUrl;
                    return;
                }

                serverOptions.forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
            });
        });

        // Test Simulation
        const speedValue = document.getElementById('speedValue');
        const speedBar = document.getElementById('speedBar');
        const currentPhase = document.getElementById('currentPhase');
        const startButton = document.getElementById('startButton');
        const buttonText = document.getElementById('buttonText');
        const statusText = document.getElementById('statusText');
        const pingCard = document.getElementById('pingCard');
        const downloadCard = document.getElementById('downloadCard');
        const uploadCard = document.getElementById('uploadCard');
        const pingValue = document.getElementById('pingValue');
        const downloadValue = document.getElementById('downloadValue');
        const uploadValue = document.getElementById('uploadValue');

        let isRunning = false;
        const MAX_DISPLAY_SPEED = 1000;

        function updateSpeedDisplay(speed) {
            speedValue.textContent = speed.toFixed(1);
            const percentage = Math.min(100, (speed / MAX_DISPLAY_SPEED) * 100);
            speedBar.style.width = percentage + '%';
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        async function simulatePing() {
            pingCard.classList.add('active', 'testing');
            currentPhase.textContent = 'Testing Ping';
            statusText.textContent = 'Measuring network latency...';

            const basePing = currentServer === 'hk' ? 15 : currentServer === 'jp' ? 35 : 120;
            const variance = Math.random() * 20 - 10;
            const finalPing = Math.max(5, Math.round(basePing + variance));

            // Count up animation
            for (let i = 0; i <= finalPing; i += Math.ceil(finalPing / 20)) {
                pingValue.textContent = i;
                await new Promise(r => setTimeout(r, 30));
            }
            pingValue.textContent = finalPing;
            pingCard.classList.remove('testing');

            await new Promise(r => setTimeout(r, 400));
            return finalPing;
        }

        async function simulateDownload() {
            downloadCard.classList.add('active', 'testing');
            currentPhase.textContent = 'Testing Download';
            statusText.textContent = 'Measuring download speed...';

            const baseSpeed = currentServer === 'hk' ? 850 : currentServer === 'jp' ? 720 : 650;
            const duration = 2500;
            const startTime = Date.now();

            while (Date.now() - startTime < duration) {
                const elapsed = Date.now() - startTime;
                const progress = elapsed / duration;
                const easedProgress = easeInOutCubic(progress);

                const fluctuation = Math.sin(progress * Math.PI * 4) * 50;
                const currentSpeed = Math.max(0, baseSpeed * easedProgress + fluctuation * (1 - progress));

                updateSpeedDisplay(currentSpeed);
                downloadValue.textContent = currentSpeed.toFixed(1);

                await new Promise(r => setTimeout(r, 50));
            }

            const finalSpeed = baseSpeed + Math.random() * 100 - 50;
            updateSpeedDisplay(finalSpeed);
            downloadValue.textContent = finalSpeed.toFixed(1);
            downloadCard.classList.remove('testing');

            await new Promise(r => setTimeout(r, 400));
            return finalSpeed;
        }

        async function simulateUpload() {
            uploadCard.classList.add('active', 'testing');
            currentPhase.textContent = 'Testing Upload';
            statusText.textContent = 'Measuring upload speed...';

            const baseSpeed = currentServer === 'hk' ? 420 : currentServer === 'jp' ? 380 : 320;
            const duration = 2500;
            const startTime = Date.now();

            while (Date.now() - startTime < duration) {
                const elapsed = Date.now() - startTime;
                const progress = elapsed / duration;
                const easedProgress = easeInOutCubic(progress);

                const fluctuation = Math.sin(progress * Math.PI * 4) * 30;
                const currentSpeed = Math.max(0, baseSpeed * easedProgress + fluctuation * (1 - progress));

                updateSpeedDisplay(currentSpeed);
                uploadValue.textContent = currentSpeed.toFixed(1);

                await new Promise(r => setTimeout(r, 50));
            }

            const finalSpeed = baseSpeed + Math.random() * 60 - 30;
            updateSpeedDisplay(finalSpeed);
            uploadValue.textContent = finalSpeed.toFixed(1);
            uploadCard.classList.remove('testing');

            return finalSpeed;
        }

        async function runSpeedTest() {
            if (isRunning) return;

            isRunning = true;
            startButton.disabled = true;
            buttonText.textContent = 'Testing...';
            statusText.textContent = 'Initializing test...';

            // Reset
            pingValue.textContent = '--';
            downloadValue.textContent = '--';
            uploadValue.textContent = '--';
            updateSpeedDisplay(0);
            [pingCard, downloadCard, uploadCard].forEach(card => card.classList.remove('active'));

            await new Promise(r => setTimeout(r, 400));

            // Run tests
            await simulatePing();
            await simulateDownload();
            await simulateUpload();

            // Complete
            currentPhase.textContent = 'Test Complete';
            statusText.textContent = 'Network performance test completed successfully';
            startButton.disabled = false;
            buttonText.textContent = 'Test Again';
            isRunning = false;

            // Reset display after a moment
            await new Promise(r => setTimeout(r, 2000));
            if (!isRunning) {
                updateSpeedDisplay(0);
                currentPhase.textContent = 'Ready to Test';
            }
        }

        startButton.addEventListener('click', runSpeedTest);
    </script>
</body>
</html>
