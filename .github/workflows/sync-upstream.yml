on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 检查一次
  workflow_dispatch:  # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 获取上游脚本
        run: |
          curl -fsSL https://raw.githubusercontent.com/Zyx0rx/vless-all-in-one/main/vless-server.sh \
            -o upstream/vless-server.sh.new

      - name: 检查变更
        id: diff
        run: |
          if diff vless-server.sh upstream/vless-server.sh.new > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "diff<<EOF" >> $GITHUB_OUTPUT
            diff vless-server.sh upstream/vless-server.sh.new >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: 应用混淆
        if: steps.diff.outputs.changed == 'true'
        run: ./obfuscate.sh upstream/vless-server.sh.new vless-server.sh

      - name: 验证混淆结果
        if: steps.diff.outputs.changed == 'true'
        run: |
          # 运行验证检查
          ./verify-obfuscation.sh vless-server.sh
          # 功能完整性检查
          grep -q "generate_xray_config\|generate_singbox_config\|install_xray\|install_singbox" vless-server.sh

      - name: 提交
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vless-server.sh release-assets/
          git commit -m "sync: upstream update $(date +%Y%m%d)"
          git push
