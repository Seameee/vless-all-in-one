on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 检查一次
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取上游脚本
        run: |
          mkdir -p upstream
          curl -fsSL https://raw.githubusercontent.com/Zyx0rx/vless-all-in-one/main/vless-server.sh \
            -o upstream/vless-server.sh.new

      - name: 检查变更
        id: diff
        run: |
          # 手动触发 (workflow_dispatch) 时强制运行
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "force=true" >> $GITHUB_OUTPUT
            echo "手动触发: 强制执行混淆与补丁"
          elif diff vless-server.sh upstream/vless-server.sh.new > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "diff<<EOF" >> $GITHUB_OUTPUT
            diff vless-server.sh upstream/vless-server.sh.new >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: 应用混淆与补丁
        if: steps.diff.outputs.changed == 'true'
        run: |
          chmod +x obfuscate.sh verify-obfuscation.sh
          bash obfuscate.sh upstream/vless-server.sh.new vless-server.sh
          python3 patch-fake-website.py vless-server.sh

      - name: 验证混淆结果
        if: steps.diff.outputs.changed == 'true'
        run: |
          # 运行验证检查
          bash verify-obfuscation.sh vless-server.sh
          # 功能完整性检查
          grep -q "generate_xray_config\|generate_singbox_config\|install_xray\|install_singbox" vless-server.sh

      - name: 验证 SpeedTest 补丁
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "=== 验证 SpeedTest 补丁 ==="
          # 检查 _install_speedtest_html 函数是否存在
          grep -q "_install_speedtest_html()" vless-server.sh || { echo "ERROR: _install_speedtest_html() 函数缺失"; exit 1; }
          echo "  OK: _install_speedtest_html() 函数已注入"
          
          # 检查是否有调用 _install_speedtest_html
          count=$(grep -c "_install_speedtest_html" vless-server.sh)
          if [[ "$count" -lt 2 ]]; then
            echo "ERROR: _install_speedtest_html 只被调用 $count 次，预期至少 2 次"
            exit 1
          fi
          echo "  OK: _install_speedtest_html 被调用 $count 次"
          
          # 检查仓库地址是否已替换
          if grep -q 'Zyx0rx/vless-all-in-one' vless-server.sh; then
            echo "ERROR: 上游仓库地址未完全替换"
            grep -n 'Zyx0rx/vless-all-in-one' vless-server.sh | head -5
            exit 1
          fi
          echo "  OK: 仓库地址已替换为 fork"
          
          # 检查原始的 Welcome 页面是否已被替换
          if grep -q 'Welcome to Our Website' vless-server.sh; then
            echo "ERROR: 原始 Welcome 页面仍然存在"
            exit 1
          fi
          echo "  OK: 原始 Welcome 页面已被替换"

      - name: 提交
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vless-server.sh release-assets/
          git commit -m "sync: upstream update $(date +%Y%m%d)"
          git push
